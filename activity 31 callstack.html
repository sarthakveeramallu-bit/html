<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript Functions</h2>
        <p>Do a calculation and then display the result.</p>
        <p id="demo"></p>
        <script>
            function add(a, b) {
                return a + b;
            }
            function avearage(a, b) {
                return add(a, b) / 2;
            }
            let result = avearage(10, 20);
            document.getElementById("demo").innerHTML = "The avearage is: " + result;

        </script>
        
    </body>
</html>
