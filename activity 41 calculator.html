<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>

    <link rel="stylesheet" href="activity 41 homework.css">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }
        .calculator{
            width: 350px;
            background: rgba;
            border-filter: blur(15px);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            padding: 25px;
        }

        .display
        {
            width: 100%;
            height: 80px;
            background: #ffffff;
            border: none;
            border-radius: 15px;
            text-align: right;
            font-size: 35px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .buttons{
            height: 65px;
            border: none;
            border-radius: 15px;
            font-size: 22px;
            curosor: pointer;
            transition: 0.3s;
        }

        .number{
            background: #f1f1f1;
        }

        .operator{

            background: #ff9500;
            color: white;
        }

        .equal{

            background: #28a754;
            color: white;
        }

        .clear{

            background: #dc3545;
            color: white;
        }
    </style>
</head>


<body>
    <div class="container">
        <input type="text" class="display" placeholder="0">

        <div class="buttons">

            <button class="clear">Clear</button>
            <button class="operator">+</button>
            <button class="operator">-</button>
            <button class="operator">/</button>
            <button class="operator">*</button>
            <button class="operator">.</button>

            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="number">0</button>
            <button class="number">00</button>
        </div>

    </div>

</body>

</html>
