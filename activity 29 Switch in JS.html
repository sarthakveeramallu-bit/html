<!DOCTYPE html>
<html>
    <body>
        <p id="demo"></p>
        <script>
            var day ;
            var dayName;
            switch (new Date().getDay()) {
                case 0:
                    dayName = "Sunday";
                    break;
                case 1:
                    dayName = "Monday";
                    break;
                case 2:
                    dayName = "Tuesday";
                    break;
                case 3:
                    dayName = "Wednesday";
                    break;
                case 4:
                    dayName = "Thursday";
                    break;
                case 5:
                    dayName = "Friday";
                    break;
                case 6:
                    dayName = "Saturday";
                    break;
                
            }
            document.getElementById("demo").innerHTML = "Today is " + dayName;
        </script>
    </body>
</html>
